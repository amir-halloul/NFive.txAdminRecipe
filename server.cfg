# NFive server configuration generated by the txAdmin deployer.
# This is a minimal config. Please read the FiveM documentation:
#   https://aka.cfx.re/server-commands
#   https://docs.fivem.net/docs/server-manual/setting-up-a-server/

## You SHOULD edit the following:
sv_hostname "{{serverName}} built with {{recipeName}}!"
sets sv_projectName "[{{recipeName}}] {{serverName}}"
sets sv_projectDesc "{{recipeDescription}}"
sets tags "NFive, default, deployer"
sets locale "en-US"

## You CAN edit the following:
sv_enforceGameBuild 3258 #mp2024_01 - Bottom Dollar Bounties
sv_licenseKey "{{svLicense}}"
sv_maxclients {{maxClients}}
{{serverEndpoints}}
set onesync on
set steam_webApiKey "none"
set sv_scriptHookAllowed false
set resources_useSystemChat true

## Base FiveM resources (cfx-server-data) start by default.
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
stop basic-gamemode
ensure hardcap
ensure baseevents

## NFive
ensure nfive

## Add system admins
add_ace group.admin command allow # allow all commands
add_ace group.admin command.quit deny # but don't allow quit
{{addPrincipalsMaster}}